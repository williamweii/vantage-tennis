name: 🎾 Daily Tennis Scraper

# 觸發條件
on:
  schedule:
    # 台灣時間每天凌晨 1 點執行 (UTC 時間 17:00)
    - cron: '0 17 * * *'
  workflow_dispatch: # 保留這個，讓你可以隨時在 GitHub 網頁上手動按按鈕執行

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase playwright beautifulsoup4 python-dotenv
          # 【關鍵】安裝無頭瀏覽器
          playwright install chromium

      - name: Run Scraper
        env:
          # 將剛剛設定的 Secrets 傳給 Python 腳本
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python scrape_all.py